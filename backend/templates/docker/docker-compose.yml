version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: easy-devops-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db
    networks:
      - easy-devops-network

  redis:
    image: redis:7-alpine
    container_name: easy-devops-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - easy-devops-network

  backend:
    build: .
    container_name: easy-devops-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://root:password@mongodb:27017/easy-devops?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your_jwt_secret_here
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      - mongodb
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - easy-devops-network

volumes:
  mongo_data:
  redis_data:

networks:
  easy-devops-network:
    driver: bridge
